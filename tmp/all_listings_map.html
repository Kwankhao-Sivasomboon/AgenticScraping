        var zoneColors = {"คลองสาน": "#9548c0", "คลองเตย": "#3158d8", "ธนบุรี": "#bc0101", "นานา": "#ef596f", "บางขุนเทียน": "#82478e", "บางจาก": "#5f1558", "บางซื่อ": "#783bd6", "บางนา": "#7fd072", "บางบอน": "#e8aa42", "บางแค": "#db2c9a", "พญาไท": "#8ec22b", "พระราม 3": "#b74cc0", "พระราม 8": "#afb514", "พระราม 9": "#57c3b3", "พระโขนง": "#9d876c", "พัฒนาการ": "#375aec", "ภาษีเจริญ": "#a782ed", "ยานนาวา": "#4d2d43", "รัชโยธิน": "#2e8300", "รัตนาธิเบศร์": "#31f913", "รามคำแหงตอนต้น": "#38d6d2", "รามอินทรา": "#b76652", "ราษฎร์บูรณะ": "#9b1f56", "ลาดพร้าว": "#04b4c3", "สยาม": "#94f4e7", "สาทร": "#5244b4", "สำโรง": "#f668b2", "สีลม": "#ef1a4e", "ห้วยขวาง": "#157a91", "อนุสาวรีย์": "#4b0f4d", "อุดมสุข": "#521068", "อโศก": "#cd5d1e", "อ่อนนุช": "#ea7b9c", "เฉลิมพระเกียรติ": "#867039", "เพลินจิต": "#511548", "เยาวราช": "#f13739", "เอกมัย": "#5fc3bf", "ไม่ระบุ": "#e9a1cf"};
        var activeZones = new Set(); // เริ่มต้นด้วย Set ว่างเปล่า

        // Create Layer Group for markers
        var markerLayer = L.layerGroup().addTo(map);

        function getIcon(color) {
            const size = 12;
            return L.divIcon({
                className: 'custom-pin',
                html: `<div style="background-color: ${color}; width: ${size}px; height: ${size}px; border-radius: 50%; border: 1px solid white;"></div>`,
                iconSize: [size, size],
                iconAnchor: [size/2, size/2]
            });
        }

        function renderMarkers() {
            markerLayer.clearLayers();
            listings.forEach(function(item) {
                if (activeZones.has(item.zone)) {
                    var color = zoneColors[item.zone];
                    var marker = L.marker([item.lat, item.lng], {
                        icon: getIcon(color)
                    }).bindPopup(`<b>${item.title}</b><br>โซน: ${item.zone}<br>ราคา: ${item.price}`);
                    
                    marker.addTo(markerLayer);
                }
            });
        }

        function updateZoneList() {
            var listDiv = document.getElementById('zone-list');
            Object.keys(zoneColors).sort().forEach(zone => {
                var item = document.createElement('div');
                item.className = 'zone-item';
                var color = zoneColors[zone];
                
                item.innerHTML = `
                    <input type="checkbox" class="zone-check" data-zone="${zone}">
                    <div class="color-dot" style="background: ${color}"></div>
                    <span>${zone}</span>
                `;
                
                item.querySelector('input').onclick = function(e) {
                    if (this.checked) activeZones.add(this.dataset.zone);
                    else activeZones.delete(this.dataset.zone);
                    renderMarkers();
                };
                
                listDiv.appendChild(item);
            });
        }

        function toggleAll(isChecked) {
            activeZones.clear();
            var checks = document.querySelectorAll('.zone-check');
            checks.forEach(c => {
                c.checked = isChecked;
                if (isChecked) activeZones.add(c.dataset.zone);
            });
            renderMarkers();
        }

        updateZoneList();
        renderMarkers();

    </script>
